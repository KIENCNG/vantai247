<!doctype html>
<html>
  <head>
    <title>Đăng ký tài xế</title>
  </head>

  <body>
    <h2>Đăng ký tài xế</h2>

    <input id="name" placeholder="Tên" /><br /><br />
    <input id="email" placeholder="Email" /><br /><br />
    <input id="password" type="password" placeholder="Mật khẩu" /><br /><br />

    <button onclick="register()">Đăng ký</button>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getAuth,
        createUserWithEmailAndPassword,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        setDoc,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDMfvsFcClupb2jSl7afHl6-HAAdTRvSa4",
        authDomain: "vantai247-d8ce0.firebaseapp.com",
        projectId: "vantai247-d8ce0",
        storageBucket: "vantai247-d8ce0.firebasestorage.app",
        messagingSenderId: "594479394374",
        appId: "1:594479394374:web:7b99a453bdf42ca2c66447",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      window.register = async function () {
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
          const userCredential = await createUserWithEmailAndPassword(
            auth,
            email,
            password,
          );
          const user = userCredential.user;

          // lưu vào Firestore
          await setDoc(doc(db, "drivers", user.uid), {
            name: name,
            email: email,
            status: "pending", // chờ admin duyệt
            createdAt: new Date(),
          });

          alert("Đăng ký thành công! Chờ admin duyệt");
        } catch (err) {
          console.error(err);
          alert(err.message);
        }
      };
    </script>
  </body>
</html>
