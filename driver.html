<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      width="device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>MGD Driver - Hệ thống Vận tải 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f3f4f9;
        overflow-x: hidden;
      }
      .sidebar-item {
        cursor: pointer;
        transition: all 0.2s;
        border-right: 4px solid transparent;
      }
      .sidebar-item-active {
        background-color: white;
        color: #1e1b4b !important;
        border-right: 4px solid #1e1b4b;
        font-weight: 700;
      }
      .map-gradient {
        background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
      }
      .slide-container {
        position: relative;
        width: 160px;
        height: 44px;
        background: #eef2ff;
        border-radius: 12px;
        overflow: hidden;
        touch-action: none;
      }
      .slide-handle {
        position: absolute;
        left: 4px;
        top: 4px;
        bottom: 4px;
        width: 40px;
        background: #1e1b4b;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        z-index: 10;
        cursor: grab;
      }
      .slide-text {
        position: absolute;
        width: 100%;
        text-align: center;
        line-height: 44px;
        font-weight: 800;
        font-size: 10px;
        color: #6366f1;
        z-index: 1;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="flex min-h-screen">
    <!-- SIDEBAR -->
    <aside
      class="w-64 bg-[#F3F4F9] border-r border-gray-200 hidden lg:flex flex-col sticky top-0 h-screen"
    >
      <div class="p-6">
        <h1
          class="text-xl font-extrabold text-navy-900 italic underline decoration-blue-500"
        >
          Mạnh Gia Đức
        </h1>
        <p
          class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1"
        >
          Driver Portal v2.0
        </p>
      </div>
      <nav class="flex-1 space-y-1">
        <div
          onclick="switchTab('dashboard')"
          id="menu-dashboard"
          class="sidebar-item sidebar-item-active flex items-center px-8 py-4 text-sm text-gray-500"
        >
          <i class="fa-solid fa-table-columns mr-3 w-5"></i> Bảng điều khiển
        </div>
        <div
          onclick="switchTab('orders')"
          id="menu-orders"
          class="sidebar-item flex items-center px-8 py-4 text-sm text-gray-500"
        >
          <i class="fa-solid fa-truck mr-3 w-5"></i> Đơn hàng mới
        </div>
        <div
          onclick="switchTab('revenue')"
          id="menu-revenue"
          class="sidebar-item flex items-center px-8 py-4 text-sm text-gray-500"
        >
          <i class="fa-solid fa-wallet mr-3 w-5"></i> Thu nhập & Công nợ
        </div>
      </nav>
      <div class="p-6">
        <button
          id="toggleBtn"
          onclick="toggleOnline()"
          class="w-full bg-[#000046] text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg"
        >
          Bật ca làm
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 p-4 lg:p-8 overflow-y-auto">
      <header class="flex justify-between items-center mb-8">
        <div>
          <h2 class="text-2xl font-black text-gray-800">Chào, Tài xế MGD!</h2>
          <div class="flex items-center mt-1">
            <div
              id="status-dot"
              class="w-2.5 h-2.5 rounded-full bg-gray-400 mr-2 border-2 border-white shadow-sm"
            ></div>
            <p
              id="status-text"
              class="text-[11px] font-black text-gray-400 uppercase tracking-tighter"
            >
              Đang ngoại tuyến
            </p>
          </div>
        </div>
      </header>

      <!-- STATS -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div
          class="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-50"
        >
          <p
            class="text-[9px] font-black text-gray-400 uppercase mb-1 tracking-widest"
          >
            Đã giao
          </p>
          <p class="text-xl font-black text-gray-800" id="stat-count">0</p>
        </div>
        <div
          class="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-50"
        >
          <p
            class="text-[9px] font-black text-gray-400 uppercase mb-1 tracking-widest"
          >
            Doanh số thu hộ
          </p>
          <p class="text-xl font-black text-green-600" id="stat-revenue">0đ</p>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 space-y-8">
          <!-- ACTIVE TRIP -->
          <div
            id="active-trip-container"
            class="map-gradient rounded-[2.5rem] p-8 text-white relative overflow-hidden min-h-[400px] shadow-2xl flex flex-col justify-between"
          >
            <div id="active-trip-content" class="relative z-10 h-full">
              <div class="opacity-30 italic text-sm text-white">
                Đang đợi lệnh vận chuyển...
              </div>
            </div>
            <i
              class="fa-solid fa-map-location-dot absolute -right-10 -bottom-10 text-[18rem] opacity-5 rotate-12 pointer-events-none"
            ></i>
          </div>

          <!-- AVAILABLE ORDERS -->
          <div>
            <h4
              class="font-bold text-gray-800 text-[11px] uppercase tracking-[0.2em] mb-4"
            >
              Đơn hàng chờ nhận (Real-time)
            </h4>
            <div id="available-list" class="space-y-4"></div>
          </div>
        </div>

        <!-- SIDE INFO -->
        <div class="space-y-8">
          <div
            class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-gray-50"
          >
            <h4
              class="font-bold text-gray-800 text-[10px] uppercase mb-6 tracking-widest"
            >
              Đội xe MGD
            </h4>
            <div class="flex items-center p-4 bg-gray-50 rounded-2xl">
              <div
                class="w-12 h-10 bg-white rounded-xl flex items-center justify-center mr-4 shadow-sm text-navy-900"
              >
                <i class="fa-solid fa-truck"></i>
              </div>
              <div>
                <p class="text-xs font-black text-gray-800">Xe 3.5 Tấn</p>
                <p class="text-[10px] text-blue-600 font-bold uppercase">
                  51C - 882.91
                </p>
              </div>
            </div>
          </div>
          <div
            class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-gray-50"
          >
            <h4
              class="font-bold text-gray-800 text-[10px] uppercase mb-6 tracking-widest"
            >
              Lịch sử vừa xong
            </h4>
            <div
              id="history-list"
              class="space-y-6 relative before:content-[''] before:absolute before:left-[7px] before:top-2 before:bottom-2 before:w-[1.5px] before:bg-gray-100"
            ></div>
          </div>
        </div>
      </div>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getFirestore,
        doc,
        updateDoc,
        onSnapshot,
        collection,
        query,
        where,
        orderBy,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDMfvsFcClupb2jSl7afHl6-HAAdTRvSa4",
        authDomain: "vantai247-d8ce0.firebaseapp.com",
        projectId: "vantai247-d8ce0",
      };
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const driverId = "driver_test_01"; // Giả lập ID tài xế cố định
      let isOnline = false;

      // --- BẬT/TẮT CA LÀM ---
      window.toggleOnline = () => {
        isOnline = !isOnline;
        const btn = document.getElementById("toggleBtn");
        const dot = document.getElementById("status-dot");
        const txt = document.getElementById("status-text");

        if (isOnline) {
          btn.innerText = "Dừng ca làm";
          btn.className =
            "w-full bg-red-50 text-red-500 py-4 rounded-2xl font-black text-xs uppercase tracking-widest border border-red-100";
          dot.className =
            "w-2.5 h-2.5 rounded-full bg-green-500 mr-2 border-2 border-white shadow-[0_0_10px_#10b981]";
          txt.innerText = "Sẵn sàng nhận đơn";
          txt.className =
            "text-[11px] font-black text-green-600 uppercase tracking-tighter";
        } else {
          btn.innerText = "Bật ca làm";
          btn.className =
            "w-full bg-[#000046] text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg";
          dot.className =
            "w-2.5 h-2.5 rounded-full bg-gray-400 mr-2 border-2 border-white";
          txt.innerText = "Đang ngoại tuyến";
          txt.className =
            "text-[11px] font-black text-gray-400 uppercase tracking-tighter";
          document.getElementById("available-list").innerHTML = "";
        }
      };

      // --- VUỐT ĐỂ NHẬN ĐƠN ---
      window.initSlider = (tripId) => {
        const handle = document.querySelector(`#handle-${tripId}`);
        const container = document.querySelector(`#slider-${tripId}`);
        if (!handle) return;
        let startX = 0,
          currentX = 0;
        const limit = container.offsetWidth - handle.offsetWidth - 8;

        const move = (e) => {
          const x = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
          currentX = Math.max(0, Math.min(limit, x - startX));
          handle.style.transform = `translateX(${currentX}px)`;
          if (e.type === "touchmove") e.preventDefault();
        };

        const end = async () => {
          if (currentX >= limit - 5) {
            handle.style.transform = `translateX(${limit}px)`;
            try {
              await updateDoc(doc(db, "trips", tripId), {
                driverId: driverId,
                status: "assigned",
              });
              Swal.fire({
                title: "Đã nhận đơn!",
                icon: "success",
                toast: true,
                position: "top-end",
                showConfirmButton: false,
                timer: 2000,
              });
            } catch (err) {
              console.error("Lỗi nhận đơn:", err);
            }
          } else {
            handle.style.transition = "transform 0.3s";
            handle.style.transform = "translateX(0)";
          }
          document.removeEventListener("mousemove", move);
          document.removeEventListener("mouseup", end);
          document.removeEventListener("touchmove", move);
          document.removeEventListener("touchend", end);
        };

        handle.addEventListener("mousedown", (e) => {
          startX = e.clientX;
          document.addEventListener("mousemove", move);
          document.addEventListener("mouseup", end);
        });
        handle.addEventListener(
          "touchstart",
          (e) => {
            startX = e.touches[0].clientX;
            document.addEventListener("touchmove", move, { passive: false });
            document.addEventListener("touchend", end);
          },
          { passive: false },
        );
      };

      // --- CHỐT ĐƠN & CẬP NHẬT CÔNG NỢ ---
      window.confirmFinishTrip = async (tripId, amount) => {
        const { value: res } = await Swal.fire({
          title:
            '<span class="text-sm font-black uppercase">Xác nhận hoàn thành</span>',
          html: `
            <div class="p-2 space-y-4 text-left">
              <div>
                <label class="text-[9px] font-bold text-gray-400 uppercase">Tiền cước thực thu (VNĐ)</label>
                <input id="sw-money" type="number" class="w-full p-4 bg-gray-50 border rounded-xl font-bold mt-1" value="${amount}">
              </div>
              <div>
                <label class="text-[9px] font-bold text-gray-400 uppercase">Trạng thái thanh toán</label>
                <select id="sw-status" class="w-full p-4 bg-gray-50 border rounded-xl font-bold mt-1">
                  <option value="paid">✅ KHÁCH ĐÃ TRẢ TIỀN</option>
                  <option value="unpaid">⚠️ KHÁCH NỢ (GHI SỔ)</option>
                </select>
              </div>
            </div>`,
          confirmButtonText: "CHỐT ĐƠN & GỬI BÁO CÁO",
          confirmButtonColor: "#1e1b4b",
          showCancelButton: true,
          preConfirm: () => ({
            money: document.getElementById("sw-money").value,
            status: document.getElementById("sw-status").value,
          }),
        });

        if (res) {
          try {
            await updateDoc(doc(db, "trips", tripId), {
              status: "done",
              amountCollected: Number(res.money),
              payment_status: res.status, // Cực kỳ quan trọng để Admin quản lý công nợ
              completedAt: serverTimestamp(),
            });
            Swal.fire(
              "Thành công",
              "Dữ liệu đã được gửi về hệ thống Admin.",
              "success",
            );
          } catch (err) {
            Swal.fire("Lỗi", "Không thể cập nhật đơn hàng.", "error");
          }
        }
      };

      // --- THEO DÕI DỮ LIỆU REAL-TIME ---
      onSnapshot(collection(db, "trips"), (snap) => {
        const availableList = document.getElementById("available-list");
        const activeContent = document.getElementById("active-trip-content");
        const historyList = document.getElementById("history-list");
        let rev = 0,
          count = 0,
          hasActive = false;

        availableList.innerHTML = "";
        historyList.innerHTML = "";

        snap.forEach((docSnap) => {
          const t = docSnap.data();
          const id = docSnap.id;

          // 1. Đơn hàng đang chờ (Chỉ hiện khi tài xế Online)
          if (t.status === "pending") {
            const item = document.createElement("div");
            item.className =
              "bg-white p-5 rounded-[2rem] shadow-sm flex flex-col space-y-4 border border-gray-100 animate-pulse-subtle";
            item.innerHTML = `
              <div class="flex justify-between items-start">
                <div class="flex items-center space-x-3">
                  <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><i class="fa-solid fa-box-archive"></i></div>
                  <div><p class="text-[10px] font-black text-gray-400 uppercase">Cước dự kiến</p><p class="text-base font-black text-gray-800">${(t.amount || 0).toLocaleString()}đ</p></div>
                </div>
                <span class="bg-blue-50 px-3 py-1 rounded-full text-[9px] font-black uppercase text-blue-600 italic">Loại xe: ${t.truckType || "N/A"}</span>
              </div>
              <div class="space-y-3 pl-4 border-l-2 border-dashed border-gray-100 ml-4">
                <div><p class="text-[9px] font-bold text-blue-500 uppercase">Lấy hàng:</p><p class="text-xs font-bold text-gray-700">${t.pickupLocation}</p></div>
                <div><p class="text-[9px] font-bold text-red-500 uppercase">Giao hàng:</p><p class="text-xs font-bold text-gray-700">${t.dropoffLocation}</p></div>
              </div>
              <div class="flex justify-end pt-2 border-t border-gray-50">
                <div class="slide-container" id="slider-${id}">
                  <div class="slide-text">VUỐT ĐỂ NHẬN</div>
                  <div class="slide-handle" id="handle-${id}"><i class="fa-solid fa-chevron-right text-[10px]"></i></div>
                </div>
              </div>`;
            availableList.appendChild(item);
            initSlider(id);
          }

          // 2. Đơn đang thực hiện (Active Trip)
          if (t.driverId === driverId && t.status === "assigned") {
            hasActive = true;
            activeContent.innerHTML = `
              <div class="flex flex-col h-full justify-between min-h-[340px]">
                <div>
                  <span class="bg-blue-500/20 backdrop-blur-md text-blue-200 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border border-white/10 italic">Đang vận chuyển</span>
                  <h3 class="text-2xl font-black mt-6 mb-8 text-white leading-tight">${t.dropoffLocation}</h3>
                  <div class="relative pl-8 space-y-6 before:content-[''] before:absolute before:left-[11px] before:top-2 before:bottom-2 before:w-[2px] before:bg-white/10">
                    <div class="relative">
                      <div class="absolute -left-[25px] top-1 w-4 h-4 bg-white rounded-full border-4 border-navy-900 z-10"></div>
                      <p class="text-[10px] font-bold text-white/40 uppercase tracking-widest">Từ:</p>
                      <p class="text-[12px] font-bold text-white/90 leading-snug">${t.pickupLocation}</p>
                    </div>
                  </div>
                </div>
                <div class="mt-8">
                  <button onclick="confirmFinishTrip('${id}', ${t.amount})" 
                    class="w-full bg-white text-[#1e1b4b] py-5 rounded-2xl font-black text-sm uppercase shadow-2xl active:scale-[0.98] transition-all flex items-center justify-center">
                    <i class="fa-solid fa-check-double mr-2"></i> HOÀN THÀNH & THU TIỀN
                  </button>
                </div>
              </div>`;
          }

          // 3. Lịch sử hoàn thành (History)
          if (t.driverId === driverId && t.status === "done") {
            count++;
            rev += t.amountCollected || 0;
            const isUnpaid = t.payment_status === "unpaid";
            historyList.innerHTML += `
              <div class="relative pl-8">
                <div class="absolute left-0 w-4 h-4 bg-navy-900 rounded-full border-4 border-white shadow-sm"></div>
                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">Giao xong</p>
                <p class="text-[11px] font-bold text-gray-800 leading-tight truncate">${t.dropoffLocation}</p>
                <p class="text-[10px] font-black ${isUnpaid ? "text-red-500" : "text-green-600"} mt-1">
                  ${isUnpaid ? "GHI NỢ" : "ĐÃ THU"}: ${(t.amountCollected || 0).toLocaleString()}đ
                </p>
              </div>`;
          }
        });

        document.getElementById("stat-count").innerText = count;
        document.getElementById("stat-revenue").innerText =
          rev.toLocaleString() + "đ";
        if (!hasActive)
          activeContent.innerHTML = `<div class="opacity-30 italic text-sm text-white">Đang đợi lệnh vận chuyển...</div>`;
      });

      window.switchTab = (tab) => {
        document
          .querySelectorAll(".sidebar-item")
          .forEach((el) => el.classList.remove("sidebar-item-active"));
        const activeItem = document.getElementById(`menu-${tab}`);
        if (activeItem) activeItem.classList.add("sidebar-item-active");
      };
    </script>
  </body>
</html>
